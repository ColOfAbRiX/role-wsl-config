---

wsl_config_os_dependencies:
 - ca-certificates
 - curl
 - dos2unix
 - python3
 - python3-mock
 - python3-pip
 - python3-setuptools
 - python3-tomli
 - python3-venv
 - socat

wsl_config_pip_dependencies: []

wsl_config_nostart_services:
 - apport
 - irqbalance
 - plymouth
 - unattended-upgrades

distro_default_wsl_config_wsl_conf:
  boot:
    protectBinfmt: "false"
  interop:
    enabled: "true"
    appendWindowsPath: "true"

distro_default_wsl_config_winconfig:
  wsl2:
    autoProxy: "true"
    dnsTunneling: "true"
    firewall: "true"
    networkingMode: "mirrored"
  experimental:
    autoMemoryReclaim: dropCache
    sparseVhd: "false"
    # vmIdleTimeout: 300000
