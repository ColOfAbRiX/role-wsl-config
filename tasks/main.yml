---
- name: "Require Correct Linux Distribution"
  ansible.builtin.assert:
    that:
      ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('22.0.0', '>=') and
      'microsoft' in ansible_kernel | lower
    msg: "This Linux distribution '{{ ansible_distribution }} {{ ansible_distribution_version }}' is not supported by the role."
    quiet: true
  tags: wsl-win-integration

- name: "Detect WSL version"
  ansible.builtin.set_fact:
    wsl_version: "{{ 'wsl2' if ansible_kernel is search('WSL2') else 'wsl1' }}"
    templates_root: "{{ 'wsl2' if ansible_kernel is search('WSL2') else 'wsl1' }}/{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}"
    files_root: "{{ 'wsl2' if ansible_kernel is search('WSL2') else 'wsl1' }}/{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}"
  tags: always

- name: "Include OS/WSL Variables"
  ansible.builtin.include_vars: "{{ wsl_version }}/vars-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
  tags: always

- name: "Run OS/WSL Tasks"
  ansible.builtin.include_tasks: "{{ wsl_version }}/{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}/main.yml"
  tags: wsl-win-integration

- name: "Set wsl.conf"
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/wsl.conf.j2"
    dest: "/etc/wsl.conf"
    owner: root
    group: root
    mode: "0644"
  tags: wsl-win-integration

- name: "Set Hostname"
  ansible.builtin.hostname: name="{{ wsl_config_wsl_hostname }}"
  when: wsl_config_wsl_hostname | default('') != ''
  tags: wsl-win-integration

- name: "Daily Cron Jobs"
  ansible.builtin.copy:
    src: "{{ templates_root }}/etc/cron.daily/{{ item }}"
    dest: "/etc/cron.daily/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - cleanups
  tags: wsl-win-integration

- name: "Update users home directory"
  ansible.builtin.replace:
    path: /etc/passwd
    regexp: "^({{ item.username }}:[^:]*:[^:]*:[^:]*:[^:]*:)([^:]*)(:[^:]*)$"
    replace: "\\1{{ wsl_config_win_home_root }}/{{ item.win_username }}\\3"
    backup: true
  loop: "{{ wsl_config_users }}"
  tags: wsl-win-integration

- name: "Set user cache directory"
  ansible.builtin.file:
    dest: "/var/cache/{{ item.username }}"
    state: directory
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: "0755"
  loop: "{{ wsl_config_users }}"
  tags: wsl-win-integration
