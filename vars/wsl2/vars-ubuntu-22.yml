---

wsl_config_os_dependencies:
 - autoconf
 - automake
 - bash-completion
 - bind9utils
 - build-essential
 - ca-certificates
 - colordiff
 - curl
 - dos2unix
 - git
 - manpages
 - python3
 - python3-colored
 - python3-dev
 - python3-git
 - python3-mock
 - python3-pip
 - python3-pycryptodome # Tentative replecement for pip pycrypto
 - python3-requests-kerberos
 - python3-setuptools
 - python3-tomli
 - python3-unittest2
 - python3-venv
 - socat
 - tmux
 - tree
 - unzip
 - wget
 - zip

wsl_config_nostart_services:
 - apport
 - irqbalance
 - plymouth
 - unattended-upgrades

distro_default_wsl_config_wsl_conf:
  boot:
    protectBinfmt: "false"
  interop:
    enabled: "true"
    appendWindowsPath: "true"

distro_default_wsl_config_winconfig:
  wsl2:
    networkingMode: "mirrored"
    dnsTunneling: "true"
    autoProxy: "true"
    firewall: "true"
    autoMemoryReclaim: dropCache
  experimental:
    sparseVhd: "false"
    vmIdleTimeout: 300000
