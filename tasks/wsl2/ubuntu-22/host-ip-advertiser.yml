---
- name: "Copy host-address.py to the target machine"
  ansible.builtin.copy:
    src: "{{ files_root }}/host-address.py"
    dest: "{{ wsl_config_host_address_path }}/host-address.py"
    owner: root
    group: root
    mode: "0755"
  tags: wsl-win-integration

- name: "Create the systemd service file from template"
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/systemd/host-address.service.j2"
    dest: /etc/systemd/system/host-address.service
    owner: root
    group: root
    mode: "0644"
  register: host_address_unit
  tags: wsl-win-integration

- name: "Reload systemd daemon"
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: host_address_unit.changed
  tags: wsl-win-integration

- name: "Enable and start the advertising service"
  become: true
  ansible.builtin.systemd:
    name: host-address
    state: restarted
    enabled: true
  tags: wsl-win-integration
