---
- name: "Install OS Dependencies"
  ansible.builtin.apt:
    name: "{{ wsl_config_os_dependencies }}"
    state: present
    update_cache: yes
    cache_valid_time: 604800 # 1 week
  tags: wsl-win-integration

- name: "Set system configuration"
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/{{ item }}.j2"
    dest: "/etc/{{ item }}"
    owner: root
    group: root
    mode: "{% if item.endswith('.sh') %}0755{% else %}0644{% endif %}"
  with_items:
    - resolv.conf
    - hosts
  tags: wsl-win-integration

- name: "Disable Unwanted Services"
  ansible.builtin.shell: "update-rc.d {{ item }} remove"
  loop: "{{ wsl_config_nostart_services }}"
  changed_when: false
  tags: wsl-win-integration

- name: "Fix WSL2 Windows Interop"
  become: true
  block:

    - name: "Mask the WSL-provided systemd skip-condition"
      ansible.builtin.file:
        path: "/etc/systemd/system/systemd-binfmt.service.d/{{ item }}"
        state: touch
        mode: "0644"
      loop:
        - wsl.conf
        - override.conf

    - name: "Deploy binfmt.d configuration with PF flags"
      ansible.builtin.copy:
        dest: /etc/binfmt.d/wsl-interop.conf
        content: ":WSLInterop:M::MZ::/init:PF\n"
        mode: "0644"

    - name: "Force-apply the correct Interop registration"
      ansible.builtin.shell: |
        systemctl daemon-reload
        echo -1 > /proc/sys/fs/binfmt_misc/WSLInterop || true
        /lib/systemd/systemd-binfmt
      register: binfmt_force
      changed_when: binfmt_force.rc == 0

    - name: "Ensure systemd-binfmt service is truly active"
      ansible.builtin.systemd:
        name: systemd-binfmt
        state: restarted
        enabled: yes

  tags: wsl-win-integration

- name: "Fix WSL2 Systemd User Session"
  become: true
  block:
    - name: "Get UID for WSL users"
      ansible.builtin.getent:
        database: passwd

    - name: "Enable User Lingering to prevent runtime-dir timeout"
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ item.username }}"
        creates: "/var/lib/systemd/linger/{{ item.username }}"
      loop: "{{ wsl_config_users }}"

    - name: "Set XDG_RUNTIME_DIR and DBUS via template"
      ansible.builtin.template:
        src: "{{ templates_root }}/etc/profile.d/wsl-xdg-runtime.sh.j2"
        dest: /etc/profile.d/wsl-xdg-runtime.sh
        owner: root
        group: root
        mode: "0644"

    - name: "Ensure user runtime services are enabled"
      ansible.builtin.systemd:
        name: "user-runtime-dir@{{ getent_passwd[item.username][1] }}.service"
        enabled: yes
      loop: "{{ wsl_config_users }}"

  tags: wsl-win-integration

- name: "Copy host-address.py to the target machine"
  ansible.builtin.copy:
    src: "{{ files_root }}/host-address.py"
    dest: "{{ wsl_config_host_address_path }}/host-address.py"
    mode: '0755'
    owner: root
    group: root
  tags: wsl-win-integration

- name: "Create the systemd service file from template"
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/systemd/host-address.service.j2"
    dest: /etc/systemd/system/host-address.service
    mode: '0644'
    owner: root
    group: root
  register: wsl_keeagent_unit
  tags: wsl-win-integration

- name: "Ensure host-address service is enabled and started"
  ansible.builtin.systemd:
    name: host-address
    state: started
    enabled: true
  tags: wsl-win-integration

- name: "Reload systemd daemon"
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: wsl_keeagent_unit.changed
  tags: wsl-win-integration
