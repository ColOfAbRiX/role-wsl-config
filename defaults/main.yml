---
# defaults file for wsl-win-integration

wsl_config_wsl_hostname: ""
wsl_config_win_home_root: "/mnt/c/Users"
wsl_config_integrate_services: true

wsl_config_users: []
#  - username: linuxusername

# /etc/wsl.conf - See https://learn.microsoft.com/en-us/windows/wsl/wsl-config#set-wsl-launch-settings
wsl_config_wsl_conf: {}
default_wsl_config_wsl_conf:
  # Automount Settings - Configure mounting of Windows drives
  automount:
    # Enable automounting of Windows drives (true/false)
    enabled: "true"
    # Also mount drives listed in /etc/fstab (true/false) - NOTE: default is true per docs
    # mountFsTab: "true"
    # Mount point under which Windows drives will be available
    # root: "/mnt/"
    # Comma-separated list of DrvFs-specific options (uid, gid, umask, fmask, dmask, metadata, case)
    options: "metadata,umask=22,fmask=11"

  # Network Settings - Control DNS and hosts file generation
  network:
    # Automatically generate /etc/hosts (true/false)
    generateHosts: "false" # Required "false" for the Network Fix
    # Automatically generate /etc/resolv.conf (true/false)
    generateResolvConf: "false" # Required "false" for the Network Fix
    # Sets hostname to be used for WSL distribution (string)
    hostname: "{{ wsl_config_wsl_hostname | default('') }}"

  # Interoperability Settings - Control Windows/Linux interoperability
  interop:
    # Enable interoperability with Windows (true/false)
    enabled: "true"
    # Add Windows PATH to Linux PATH (true/false)
    appendWindowsPath: "true"

  # User Settings - Default user for WSL
  # user:
  #   # Default user to launch WSL with (string)
  #   default: ""

  # Boot Settings - Commands and services to run at boot
  boot:
    # Command to run when WSL instance boots (string)
    # command: ""
    # Enable systemd support (true/false) - Note: requires WSL 0.67.6+
    systemd: "{{ default_wsl_config_wsl_conf_boot_systemd }}"
    # Prevent WSL from generating systemd units when systemd is enabled (bool, Win11+)
    protectBinfmt: "false"

  # GPU Settings - GPU access (WSL2 only)
  # gpu:
  #   # Enable GPU access from WSL (true/false)
  #   enabled: "true"

  # Time Settings - Time synchronization
  # time:
  #   # Use and sync to Windows timezone (true/false)
  #   useWindowsTimezone: "true"

# /etc/hosts
wsl_config_hosts: []
#  - addr: 192.168.0.1
#    fqdn: test.example.com
#    short: test

# /etc/resolve.conf
wsl_config_wsl_resolveConf: []

# Host IP address advertising service
wsl_config_host_address_path: "/usr/local/bin"
wsl_config_host_address_file: "/run/host-address.fifo"
wsl_config_host_address_pid: "/var/run/host-address.pid"

# Network fix. See: https://github.com/microsoft/WSL/issues/5420#issuecomment-646479747
wsl_config_networkfix_enabled: true
wsl_config_networkfix_mtu: ""
wsl_config_networkfix_resolv_conf:
  network:
    generateHosts: "false"
    generateResolvConf: "false"
wsl_config_winconfig_manage: false
wsl_config_winconfig:
  wsl2:
    networkingMode: "mirrored"
    dnsTunneling: "true"
    autoProxy: "true"
    firewall: "true"
