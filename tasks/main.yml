---
- name: "Require Correct Linux Distribution"
  ansible.builtin.assert:
    that:
      ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('22.0.0', '>=') and
      'microsoft' in ansible_kernel | lower
    msg: "This Linux distribution '{{ ansible_distribution }} {{ ansible_distribution_version }}' is not supported by the role."
    quiet: true
  tags: wsl-win-integration

- name: "Set Variables"
  block:
    - ansible.builtin.set_fact:
        wsl_version: "{{ 'wsl2' if ansible_kernel is search('WSL2') else 'wsl1' }}"

    - ansible.builtin.set_fact:
        templates_root: "{{ wsl_version }}/{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}"
        files_root: "{{ wsl_version }}/{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}"

  tags: wsl-win-integration

- name: "Load Variables"
  ansible.builtin.include_vars: "{{ lookup('first_found', files) }}"
  vars:
    files:
      - "vars/{{ wsl_version }}/vars-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
      - "vars/{{ wsl_version }}/vars-{{ ansible_distribution | lower }}.yml"
      - "vars/{{ wsl_version }}/vars-{{ ansible_os_family | lower }}.yml"
  tags: wsl-win-integration

- name: "Run Environment Tasks"
  ansible.builtin.include_tasks: "{{ lookup('first_found', files) }}"
  vars:
    files:
      - "tasks/{{ wsl_version }}/{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}/main.yml"
      - "tasks/{{ wsl_version }}/{{ ansible_distribution | lower }}/main.yml"
      - "tasks/{{ wsl_version }}/{{ ansible_os_family | lower }}/main.yml"
  tags: wsl-win-integration

- name: "Set Hostname"
  ansible.builtin.hostname: name="{{ wsl_config_wsl_hostname }}"
  when: wsl_config_wsl_hostname | default('') != ''
  tags: wsl-win-integration

- name: "Daily Cron Jobs"
  ansible.builtin.copy:
    src: "{{ templates_root }}/etc/cron.daily/{{ item }}"
    dest: "/etc/cron.daily/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - cleanups
  tags: wsl-win-integration

- name: "Update users home directory"
  ansible.builtin.replace:
    path: /etc/passwd
    regexp: "^({{ item.username }}:[^:]*:[^:]*:[^:]*:[^:]*:)([^:]*)(:[^:]*)$"
    replace: "\\1{{ wsl_config_win_home_root }}/{{ item.win_username }}\\3"
    backup: true
  loop: "{{ wsl_config_users }}"
  tags: wsl-win-integration

- name: "Set wsl.conf"
  ansible.builtin.template:
    src: "{{ templates_root }}/etc/wsl.conf.j2"
    dest: "/etc/wsl.conf"
    owner: root
    group: root
    mode: "0644"
  tags: wsl-win-integration

- name: "Set .wslconfig"
  ansible.builtin.template:
    src: "{{ wsl_version }}/wslconfig.j2"
    dest: "{{ wsl_config_win_home_root }}/{{ item.win_username }}/.wslconfig"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ wsl_config_users }}"
  tags: wsl-win-integration
